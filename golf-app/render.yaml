services:
  - type: web
    name: gimmepar
    env: node
    buildCommand: npm install
    startCommand: node server.js
    nodeVersion: 20
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # Set this to your Render Postgres Internal Database URL
      - key: ANTHROPIC_API_KEY
        sync: false
